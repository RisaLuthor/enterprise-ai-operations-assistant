name: SBOM

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install CycloneDX tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install cyclonedx-bom

      - name: Generate SBOM
        run: |
          set -euo pipefail

          if [ -f requirements.txt ]; then
            echo "Generating SBOM from requirements.txt"
            cyclonedx-py requirements -i requirements.txt -o sbom.cdx.json
          elif [ -f pyproject.toml ]; then
            echo "Generating SBOM from pyproject.toml"
            cyclonedx-py project -o sbom.cdx.json
          else
            echo "No requirements.txt or pyproject.toml found."
            exit 1
          fi

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
