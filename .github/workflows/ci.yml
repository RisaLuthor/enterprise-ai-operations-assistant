name: CI

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APP_NAME: Enterprise AI Operations Assistant
      APP_ENV: test
      LOG_LEVEL: INFO
      REQUIRE_API_KEY: true
      APP_DB_PATH: data/app.db

      INDIVIDUAL_API_KEY: test-individual-key
      COMPANY_API_KEY: test-company-key
      ENTERPRISE_API_KEY: test-enterprise-key

      SQUARE_ACCESS_TOKEN: test-square-token
      SQUARE_ENVIRONMENT: sandbox
      SQUARE_LOCATION_ID: test-location-id
      SQUARE_WEBHOOK_SIGNATURE_KEY: test-webhook-signature
      SQUARE_WEBHOOK_NOTIFICATION_URL: https://example.com/v1/billing/square/webhook

      SQUARE_INDIVIDUAL_PLAN_VARIATION_ID: test-individual-plan
      SQUARE_COMPANY_PLAN_VARIATION_ID: test-company-plan
      SQUARE_ENTERPRISE_PAYMENT_LINK: https://example.com/enterprise

      APP_SUCCESS_URL: http://127.0.0.1:8000/checkout/success
      APP_CANCEL_URL: http://127.0.0.1:8000/checkout/cancel
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Generate coverage badge
        run: |
          mkdir -p badges
          python -m coverage_badge -o badges/coverage.svg -f

      - name: Compile (if src exists)
        run: |
          if [ -d src ]; then
            python -m compileall -q src
          else
            echo "No src/ directory; skipping compileall."
          fi

      - name: Run tests with coverage
        run: |
          if [ -d src ]; then
            python -m pytest -q --cov=src --cov-report=term-missing --cov-report=xml --cov-report=html
          else
            python -m pytest -q --cov=. --cov-report=term-missing --cov-report=xml --cov-report=html
          fi

      - name: Generate coverage badge
        run: |
          mkdir -p badges
          coverage-badge -o badges/coverage.svg -f

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage.xml
            htmlcov/

      - name: Commit updated coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git diff --cached --quiet || git commit -m "Update coverage badge [skip ci]"
          git push