<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Retrieve Access | Enterprise AI Operations Assistant</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #111833;
        --text: #edf2ff;
        --muted: #aab6d3;
        --line: #26345f;
        --accent: #6ea8fe;
        --success: #22c55e;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 56px 20px;
      }
      .card {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 24px;
        padding: 28px;
      }
      h1 {
        margin-top: 0;
        font-size: 40px;
      }
      p {
        color: var(--muted);
        line-height: 1.6;
      }
      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: #0d1530;
        color: var(--text);
        font-size: 16px;
      }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 14px 16px;
        border: 0;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        color: white;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
      }
      .status {
        display: none;
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 14px;
      }
      .show { display: block; }
      .success {
        background: rgba(34, 197, 94, 0.12);
        border: 1px solid rgba(34, 197, 94, 0.35);
      }
      .error {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.35);
      }
      code {
        display: block;
        margin-top: 10px;
        padding: 12px;
        border-radius: 12px;
        background: #0a1228;
        word-break: break-all;
      }
      a {
        color: #cfe0ff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Retrieve your access</h1>
        <p>
          Enter the same email address used during checkout. If your account has already been
          provisioned, your API key and plan details will appear below.
        </p>

        <input id="email" type="email" placeholder="you@company.com" autocomplete="email" />
        <button onclick="retrieveAccess()">Retrieve Access</button>

        <div id="status" class="status"></div>
      </div>
    </div>

    <script>
      const statusBox = document.getElementById("status");
      const emailInput = document.getElementById("email");

      function renderStatus(type, html) {
        statusBox.className = `status show ${type}`;
        statusBox.innerHTML = html;
      }

      async function retrieveAccess() {
        const email = (emailInput.value || "").trim().toLowerCase();
        if (!email) {
          renderStatus("error", "Please enter your email address.");
          return;
        }

        renderStatus("success", "Checking access...");

        try {
          const response = await fetch("/v1/access/retrieve", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.message || data.detail || "Unable to retrieve access.");
          }

          if (!data.provisioned) {
            renderStatus(
              "error",
              "We found your request, but access is not ready yet. Please try again shortly or contact support."
            );
            return;
          }

          renderStatus(
            "success",
            `
              <strong>Access ready</strong><br />
              Plan: ${data.plan}<br />
              Email: ${data.email}
              <code>${data.api_key}</code>
            `
          );
        } catch (error) {
          renderStatus("error", error.message || "Something went wrong.");
        }
      }
    </script>
  </body>
</html>
